name: Build with conan on multiple platforms

on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        profile:
          - name: clang
            version: 18
            libcxx: libstdc++11
            c: clang-18
            cpp: clang++-18
          - name: gcc
            version: 14
            libcxx: libstdc++11
            c: gcc-14
            cpp: g++-14

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache conan packages
        id: cache-conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: >
            conan-cache
            ${{ runner.os }}
            ${{ matrix.profile.name }}
            ${{ matrix.profile.version }}
            ${{ matrix.profile.libcxx }}

      - name: Install conan 2
        run: pip install "conan~=2.0"

      - name: Create conan profiles dir
        run: mkdir -p ~/.conan2/profiles

      - name: Create conan profile
        run: |
          echo '
          [settings]
          arch=x86_64
          build_type=Release
          compiler=${{ matrix.profile.name }}
          compiler.cppstd=20
          compiler.libcxx=${{ matrix.profile.libcxx }}
          compiler.version=${{ matrix.profile.version }}
          os=Linux

          [conf]
          tools.build:compiler_executables={"c": "${{ matrix.profile.c }}", "cpp": "${{ matrix.profile.cpp }}"}
          ' > ~/.conan2/profiles/default

      - name: Install dependencies
        run: conan install . --build missing

      - name: Run conan create
        run: conan create .
