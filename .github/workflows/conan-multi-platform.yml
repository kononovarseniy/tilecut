name: Build with conan on multiple platforms

on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        conf:
          - id: ubuntu-clang-18-libstdc++11
            runner: ubuntu-latest
            conan-profile: |
              [settings]
              arch=x86_64
              os=Linux
              compiler=clang
              compiler.cppstd=20
              compiler.libcxx=libstdc++11
              compiler.version=18
              build_type=Release

              [conf]
              tools.build:compiler_executables={"c": "clang-18", "cpp": "clang++-18"}

          - id: ubuntu-gcc-14-libstdc++11
            runner: ubuntu-latest
            conan-profile: |
              [settings]
              arch=x86_64
              os=Linux
              compiler=gcc
              compiler.cppstd=20
              compiler.libcxx=libstdc++11
              compiler.version=14
              build_type=Release

              [conf]
              tools.build:compiler_executables={"c": "gcc-14", "cpp": "g++-14"}

          - id: macos-apple-clang-16-libc++
            runner: macos-15
            conan-profile: |
              [settings]
              arch=armv8
              os=Macos
              compiler=apple-clang
              compiler.cppstd=20
              compiler.libcxx=libc++
              compiler.version=16
              build_type=Release

              [conf]
              tools.build:compiler_executables={"c": "clang", "cpp": "clang++"}

          - id: windows-msvc-2022
            runner: windows-latest
            conan-profile: |
              [settings]
              arch=x86_64
              os=Windows
              compiler=msvc
              compiler.cppstd=20
              compiler.version=194
              compiler.runtime=static
              compiler.runtime_type=Release
              build_type=Release

    runs-on: ${{ matrix.conf.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache conan packages
        id: cache-conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: ${{ matrix.conf.id }}

      - name: Install conan 2
        run: pip install "conan~=2.0"

      - name: Create conan profile
        run: |
          mkdir -p ~/.conan2/profiles
          echo '${{ matrix.conf.conan-profile }}' > ~/.conan2/profiles/default

      - name: Install dependencies
        run: conan install . --build missing

      - name: Run conan create
        run: conan create .
